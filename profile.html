<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Skater Profile</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    margin:0;
}

.container{
    max-width:700px;
    margin:auto;
    margin-top:40px;
    background:#2d2d2d;
    padding:20px;
    border-radius:15px;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

.avatar{
    width:80px;
    height:80px;
    border:3px solid transparent;
    margin:5px;
    cursor:pointer;
    border-radius:50%;
    font-size:50px;
    line-height:80px;
    display:inline-block;
    background:#444;
}

.selected{
    border-color:gold;
}

.stat{
    background:#3a3a3a;
    padding:10px;
    margin:5px;
    border-radius:10px;
}

#profileCard{
    margin-top:20px;
    padding:20px;
    background:#444;
    border-radius:15px;
}
</style>
</head>
<body>

<div class="container">

<h1>🛹 Skater Profile</h1>

<input id="username" placeholder="Enter Username">

<h3>Choose Avatar</h3>

<div id="avatars">
<div class="avatar" onclick="selectAvatar('😎')">😎</div>
<div class="avatar" onclick="selectAvatar('🔥')">🔥</div>
<div class="avatar" onclick="selectAvatar('🛹')">🛹</div>
<div class="avatar" onclick="selectAvatar('👑')">👑</div>
<div class="avatar" onclick="selectAvatar('💀')">💀</div>
<div class="avatar" onclick="selectAvatar('⚡')">⚡</div>
</div>

<br>

<button onclick="saveProfile()">Save Profile</button>
<button onclick="resetProfile()">Reset Profile</button>

<div id="profileCard">

<h2 id="displayAvatar">🛹</h2>

<h2 id="displayName">No Username</h2>

<div class="stat">
Level: <span id="level">1</span>
</div>

<div class="stat">
XP: <span id="xp">0</span>
</div>

<div class="stat">
Money: $<span id="money">0</span>
</div>

<div class="stat">
Lifetime Tricks: <span id="tricks">0</span>
</div>

<div class="stat">
Highest Combo: <span id="combo">0</span>
</div>

<div class="stat">
Board Owned: <span id="board">Starter Board</span>
</div>

</div>

</div>

<script>

let selectedAvatar = "🛹";

function selectAvatar(icon){

    selectedAvatar = icon;

    document
    .querySelectorAll(".avatar")
    .forEach(a=>a.classList.remove("selected"));

    [...document.querySelectorAll(".avatar")]
    .find(a=>a.textContent===icon)
    .classList.add("selected");
}

function saveProfile(){

    const username =
    document.getElementById("username").value.trim();

    if(username===""){
        alert("Enter a username");
        return;
    }

    const profile = {

        username: username,
        avatar: selectedAvatar,

        level: 1,
        xp: 0,
        money: 0,
        tricks: 0,
        highestCombo: 0,
        board: "Starter Board",

        created:
        new Date().toLocaleDateString()

    };

    localStorage.setItem(
        "skaterProfile",
        JSON.stringify(profile)
    );

    loadProfile();

    alert("Profile Saved!");
}

function loadProfile(){

    const data =
    localStorage.getItem("skaterProfile");

    if(!data) return;

    const profile =
    JSON.parse(data);

    document.getElementById(
        "displayName"
    ).textContent =
    profile.username;

    document.getElementById(
        "displayAvatar"
    ).textContent =
    profile.avatar;

    document.getElementById(
        "level"
    ).textContent =
    profile.level;

    document.getElementById(
        "xp"
    ).textContent =
    profile.xp;

    document.getElementById(
        "money"
    ).textContent =
    profile.money;

    document.getElementById(
        "tricks"
    ).textContent =
    profile.tricks;

    document.getElementById(
        "combo"
    ).textContent =
    profile.highestCombo;

    document.getElementById(
        "board"
    ).textContent =
    profile.board;
}

function resetProfile(){

    if(confirm("Delete profile?")){

        localStorage.removeItem(
            "skaterProfile"
        );

        location.reload();
    }
}

loadProfile();

</script>

</body>
</html>
